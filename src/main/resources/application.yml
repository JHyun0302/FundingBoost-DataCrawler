spring:
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug

server:
  port: 8090

crawler:
  bootstrap:
    enabled: false
    item-limit: 20
  init-api:
    enabled: false
